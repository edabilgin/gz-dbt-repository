version: 2 
sources: 
  - name: raw 
    schema: gz_raw_data 
    tables: 
    - name: sales 
      identifier: raw_gz_sales 
      description: "Greenweez satiş verilerini içeren ham tablo"
      columns:
        - name: date_date
          description: "Satisin gerçekleştiği tarih"
        - name: orders_id
          description: "Benzersiz sipariş numarasi" 
    - name: product
      identifier: raw_gz_product 
      description: "Ürün bilgilerini ve maliyetlerini içeren tablo"
      columns:
        - name: products_id
          description: "ürünün benzersiz kimlik numarasi"
          tests: 
            - unique
            - not_null
            
        - name: purchase_price
          description: "ürünün birim alis fiyati"
    - name: ship 
      identifier: raw_gz_ship
      description: "nakliye ve gönderim detaylarini içeren tablo"
      columns:
        - name: orders_id
          description: "ilgili siparişin numarasi"
          tests:
            - unique
            - not_null
            
        - name: shipping_fee
          description: "müşteriden alinan kargo ücreti"
    - name : adwords
      identifier: raw_gz_adwords
      description: "Adwords reklam harcamalari verisi"
      columns:
        - name: date_date 
        - name: paid_source
        - name: campaign_key
        - name: camPGN_name
        - name: ads_cost
        - name: impression
        - name: click
    - name : facebook
      identifier: raw_gz_facebook
      description: "Facebook reklam harcamalari verisi"
      columns:
        - name: date_date 
        - name: paid_source
        - name: campaign_key
        - name: camPGN_name
        - name: ads_cost
        - name: impression
        - name: click
    - name : bingo
      identifier: raw_gz_bing
      description: "Bingo reklam harcamalari verisi"
      columns:
        - name: date_date 
        - name: paid_source
        - name: campaign_key
        - name: camPGN_name
        - name: ads_cost
        - name: impression
        - name: click
    - name : criteo
      identifier: raw_gz_criteo
      description: "Criteo reklam harcamalari verisi"
      columns:
        - name: date_date 
        - name: paid_source
        - name: campaign_key
        - name: camPGN_name
        - name: ads_cost
        - name: impression
        - name: click
models:
  - name: int_campaigns
    columns:
      - name: date_date
        tests:
          - not_null
      - name: campaign_key
        tests:
          - not_null
          - unique
      - name: ads_cost
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
